<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="booking.css">

</head>

<body>

<div class="booking-page">

    <!-- Logo -->

    <div class="logo">

        <img src="rapido-logo.png" alt="Rapido">

    </div>


    <!-- Location -->

    <div class="location-box">

        <div class="location-row">

            <i class="fa-solid fa-location-dot pickup-icon"></i>

            <span id="pickupLocation"></span>

        </div>

        <hr>

        <div class="location-row">

            <i class="fa-solid fa-location-dot drop-icon"></i>

            <span id="dropLocation"></span>

        </div>

    </div>


    <!-- Select Service -->

    <h2 class="service-title">Select service</h2>

<!-- Auto -->
<div class="service-card">
    <div class="service-left">
        <img src="auto.png" alt="Auto">
        <h3>Auto</h3>
    </div>

    <div class="price">₹109 - ₹132</div>
</div>

<!-- Bike -->
<div class="service-card">
    <div class="service-left">
        <img src="bike.png" alt="Bike">
        <h3>Bike</h3>
    </div>

    <div class="price">₹65 - ₹85</div>
</div>

<!-- Cab -->
<div class="service-card">
    <div class="service-left">
        <img src="cab.png" alt="Cab">
        <h3>Cab</h3>
    </div>

    <div class="price">₹220 - ₹270</div>
</div>




<!-- Bottom -->

<div class="bottom-bar">

    <div class="payment">

        <i class="fa-regular fa-credit-card"></i>

      <select class="payment-select" id="paymentMethod">
    <option value="cash">Cash</option>
    <option value="cod">Cash on Delivery</option>
    <option value="gpay">Google Pay</option>
    <option value="paytm">Paytm</option>
    <option value="phonepe">PhonePe</option>
    <option value="upi">UPI</option>
    <option value="card">Credit / Debit Card</option>
</select>

    </div>

    <button class="continue-btn"
onclick="alert('Sorry! Service is currently not available.')">
    Continue Booking
</button>
</div>



<script>

document.getElementById("pickupLocation").innerText =
localStorage.getItem("pickup");

document.getElementById("dropLocation").innerText =
localStorage.getItem("drop");

</script>


</body>
</html>
